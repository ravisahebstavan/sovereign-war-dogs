version: "3.9"

services:
  redis:
    image: redis:7-alpine
    command: redis-server /etc/redis/redis.conf
    volumes:
      - ./redis.conf:/etc/redis/redis.conf:ro
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  sovereign-core:
    build:
      context: ../sovereign
      dockerfile: Dockerfile
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://redis:6379
      - FINNHUB_API_KEY=${FINNHUB_API_KEY}
    ports:
      - "9001:9001"
    restart: unless-stopped

  signal-news-poller:
    image: python:3.12-slim
    depends_on:
      redis:
        condition: service_healthy
    working_dir: /workdir
    volumes:
      - ../signal:/workdir
    command: bash -c "pip install --no-cache-dir -r requirements.txt && python news_poller.py"
    environment:
      - REDIS_URL=redis://redis:6379
      - FINNHUB_API_KEY=${FINNHUB_API_KEY}

  signal-engine:
    image: python:3.12-slim
    depends_on:
      - redis
    working_dir: /workdir
    volumes:
      - ../signal:/workdir
    command: bash -c "pip install --no-cache-dir -r requirements.txt && python engine.py"
    environment:
      - REDIS_URL=redis://redis:6379
      - ALPHA_THRESHOLD=${ALPHA_THRESHOLD:-0.10}
      - MAX_POSITION_USD=${MAX_POSITION_USD:-1000}
      - ALPACA_API_KEY=${ALPACA_API_KEY}
      - ALPACA_SECRET_KEY=${ALPACA_SECRET_KEY}

  ui:
    image: node:20-alpine
    depends_on:
      redis:
        condition: service_healthy
      sovereign-core:
        condition: service_started
    working_dir: /workdir/ui
    volumes:
      - ../ui:/workdir/ui
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:9001

networks:
  default:
    name: sovereign_net
